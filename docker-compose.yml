services:
  bomwidget:
    build:
      context: .
      dockerfile: Dockerfile
    image: bomwidget:latest
    container_name: bomwidget
    ports:
      - "8894:8894"
    volumes:
      # SSL sertifikaları için volume mount (proje klasöründen)
      - ./certificates:/app/certificates:ro
      # Hot reload için tüm kaynak dosyalarını mount et
      - ./src:/app/src
      - ./webpack:/app/webpack
      - ./public:/app/public
      - ./widget-config.js:/app/widget-config.js
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      # node_modules'i host ile paylaş (node_modules'i mount etme)
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - widget-network
    restart: unless-stopped

networks:
  widget-network:
    driver: bridge
