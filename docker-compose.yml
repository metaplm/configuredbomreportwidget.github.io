services:
  configuredbomwidget:
    build:
      context: .
      dockerfile: Dockerfile
    image: configuredbomwidget:latest
    container_name: configuredbomwidget
    ports:
      - "8895:8895"
    volumes:
      # SSL sertifikaları için volume mount (proje klasöründen)
      - ./certificates:/app/certificates:ro
      # Hot reload için tüm kaynak dosyalarını mount et
      - ./src:/app/src
      - ./webpack:/app/webpack
      - ./public:/app/public
      - ./widget-config.js:/app/widget-config.js
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      # node_modules'i host ile paylaş (node_modules'i mount etme)
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - configuredbomwidget-network
    restart: unless-stopped

networks:
  configuredbomwidget-network:
    driver: bridge
